<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Sunrise Animation</title>
    <style>
      body {
        margin: 0;
        background: rgba(255, 255, 255, 0);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        user-select: none;
        overflow: hidden;
      }
      img {
        -moz-window-dragging: no-drag;
        user-select: none;
      }
      .bg {
        position: absolute;
        inset: 0;
        background: url(bg.jpg);
        background-repeat: repeat-x;
        background-size: auto 100%;
        background-position: top center;
        z-index: 2;
        transition:
          opacity 0.4s ease-out,
          filter 0.4s ease-out;
        inset: 0;
      }
      .bg-white {
        background-color: #000;
        position: absolute;
        z-index: 1;
      }
      .cloud {
        position: absolute;
        inset: 0;
        background: url(cloud.png);
        background-repeat: no-repeat;
        background-size: 100% auto;
        background-position: bottom center;
        z-index: 3;
      }
      .stage {
        position: absolute;
        width: min(100vw, 177.78vh);
        height: min(56.25vw, 100vh);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 4;
        cursor: pointer;
      }
      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .sun {
        position: absolute;
        width: 500px;
        left: 0;
        top: 0;
        transform: translate(-50%, 50%);
        z-index: 1;
      }
      .path-svg {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .path-svg path {
        stroke: none;
        fill: none;
      }
      #frame1 {
        width: auto;
        height: 90%;
      }
      /* .frame1-text {
        position: absolute;
        width: auto;
        height: 5vh;
        max-height: 60px;
        margin: auto;
        top: 70vh;
        left: 0;
        right: 0;
        opacity: 0;
      }
      .frame1-cta {
        position: absolute;
        max-width: 250px;
        top: 76vh;
        margin: auto;
        left: 0;
        right: 0;
        opacity: 0;
      } */
      .sun-screen-layer {
        height: 100%;
        mix-blend-mode: screen;
        top: -48vh;
        left: 17vw;
        position: absolute;
        z-index: 2;
        opacity: 0;
      }
      .reveal-stack {
        position: absolute;
        top: 14vh;
        left: 0;
        right: 0;
        margin: auto;
        width: fit-content;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2vh;
      }

      .reveal-wrap {
        position: relative;
        width: 20vw;
        height: auto;
        aspect-ratio: 260 / 478;
        max-width: 260px;
        max-height: 478px;
        cursor: pointer;
        opacity: 0;
        z-index: 4;
      }

      .frame1-text {
        position: relative;
        width: auto;
        height: 5vh;
        max-height: 60px;
        opacity: 0;
      }

      .frame1-cta {
        position: relative;
        max-width: 250px;
        opacity: 0;
      }
      .reveal-wrap img {
        position: absolute;
      }
      .real-img {
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .cover {
        width: 100%;
        height: 100%;
        clip-path: inset(0% 0% 0% 0%);
        z-index: 2;
        transition:
          clip-path 0.7s cubic-bezier(0.65, 0, 0.35, 1),
          opacity 0.4s ease;
      }
      .frame2-text1 {
        position: absolute;
        width: 50vw;
        height: auto;
        max-width: 500px;
        opacity: 0;
        margin: auto;
        top: 30%;
        left: 48%;
      }
      .frame2-text2 {
        position: absolute;
        width: 50vw;
        height: auto;
        max-width: 500px;
        opacity: 0;
        margin: auto;
        top: 30%;
        left: 48%;
      }
      #catfish {
        width: 100vw;
        height: 250px;
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 1000;
        background-image: url(normal-bg.png);
        background-position: bottom center;
        background-repeat: repeat-x;
        background-size: auto 100px;
        transform: translate(0, 100vh);
      }
      #catfish .content {
        width: 100%;
        height: 100%;
        max-width: 900px;
        position: relative;
        margin: auto;
        left: 0;
        right: 0;
        display: flex;
        align-items: flex-start;
        z-index: 2;
      }
      #catfish #weather {
        background-image: url(temp-bg.png);
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% auto;
        aspect-ratio: 356/222;
        width: 22%;
        margin-top: 16%;
        margin-left: 2%;
        display: flex;
        align-items: center;
      }
      #catfish #weather img {
        width: 28%;
        height: auto;
        max-width: 80px;
        margin: 10% 0 0 15%;
      }
      #catfish #weather div {
        color: #db8000;
        font-size: 1.8rem;
        margin: 12% 0 0 9%;
        letter-spacing: -1px;
      }
      #catfish .logo {
        width: 10%;
        height: auto;
        margin-top: 17%;
      }
      #catfish #text {
        width: 38%;
        height: 28%;
        padding-top: 19%;
        position: relative;
      }
      #catfish #text img {
        width: 100%;
        max-width: 400px;
        height: auto;
        position: absolute;
      }
      #catfish .catfishProdcut {
        width: 27%;
        height: auto;
        margin-top: 3%;
      }
      #closeBtn {
        background-image: url(closebtn.png);
        width: 40px;
        height: 40px;
        background-size: 30px 30px;
        background-repeat: no-repeat;
        z-index: 999;
        position: absolute;
        left: 17%;
        top: 135px;
      }
      #catfishClick {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 3;
        left: 0;
        right: 0;
      }
      .heat-svg {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
        cursor: pointer;
      }
      .heat {
        width: 80vw;
        height: 40vh;
        filter: url(#heat-distort);
        background: url(bg.jpg);
        background-repeat: repeat-x;
        background-size: auto 100vh;
        background-position: top center;
        position: absolute;
        z-index: 1;
        top: 0;
        opacity: 0;
      }
      #splash-container {
        width: 40vw;
        height: 100%;
        position: absolute;
        margin: auto;
        left: 0;
        right: 0;
        top: 0;
        z-index: 3;
        pointer-events: none;
        max-width: 400px;
      }
      .splash {
        position: absolute;
        pointer-events: none;
        transform-origin: center center;
        animation: splashAnim var(--dur) ease-out forwards;
      }
      @keyframes splashAnim {
        0% {
          opacity: 0;
          transform: var(--t) scale(0.3);
        }
        15% {
          opacity: 0.9;
          transform: var(--t) scale(0.6);
        }
        100% {
          opacity: 0;
          transform: var(--t) scale(1.15);
        }
      }
      @media (-webkit-min-device-pixel-ratio: 1.5), (min-resolution: 144dpi) {
        .reveal-wrap {
          width: clamp(120px, 15vw, 260px);
        }
        .sun {
          width: clamp(180px, 39%, 380px);
        }
        .frame2-text1,
        .frame2-text2 {
          width: clamp(180px, 40%, 400px);
        }
      }
      @media (-webkit-max-device-pixel-ratio: 1.0), (max-resolution: 96dpi) {
        .reveal-wrap {
          width: 25vw;
          max-width: 325px;
          max-height: 597px;
        }
        .sun {
          width: 40vw;
          max-width:600px;
        }
        .frame2-text1,
        .frame2-text2 {
          max-width: 620px;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
    <div class="bg-white"></div>
    <div class="bg"></div>
    <div class="heat"></div>
    <svg class="heat-svg">
      <filter id="heat-distort" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.005 0.01" numOctaves="2" seed="2" />
        <feDisplacementMap in="SourceGraphic" scale="200" />
      </filter>
    </svg>
    <div class="cloud"></div>
    <div class="stage">
      <div class="scene">
        <div id="frame1">
          <img src="sun.png" class="sun" />
          <img src="flare.png" class="sun-screen-layer" />
          <svg class="path-svg" viewBox="0 0 1280 720">
            <path id="motionPath" d="M 0 700 Q 250 0 640 -30" />
          </svg>
          <div class="reveal-stack">
            <div class="reveal-wrap" id="revealBox">
              <img src="hide-product.png" class="hide-product cover" />
              <img src="product.png" class="real-img" />
            </div>
            <img src="frame1-text.png" class="frame1-text" />
            <img class="frame1-cta" src="frame1-tap.png" />
            <div id="splash-container"></div>
          </div>
          <!-- <div class="reveal-wrap" id="revealBox">
            <img src="hide-product.png" class="hide-product cover" />
            <img src="product.png" class="real-img" />
          </div> -->

          <!-- <img src="frame1-text.png" class="frame1-text" /> -->
          <!-- <img class="frame1-cta" src="frame1-tap.png" /> -->
          <img src="frame2-text1.png" class="frame2-text1" />
          <img src="frame2-text2.png" class="frame2-text2" />
        </div>
      </div>
    </div>
    <div id="catfish">
      <div id="closeBtn"></div>
      <div id="catfishClick"></div>
      <div class="content">
        <img class="logo" src="logo.png" />
        <div id="weather">
          <img class="icon" src="icon-sun.png" />
          <div>30&#xb0;C</div>
        </div>
        <div id="text">
          <img class="text1" src="catfish-text.png" />
          <img class="text2" src="normal-text.png" />
          <img class="text3" src="catfish-text2.png" />
        </div>
        <img class="catfishProdcut" src="catfish-product.png" />
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
